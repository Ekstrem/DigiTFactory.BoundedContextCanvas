name: Deploy Swagger UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/BoundedContextCanvas.Api/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore src/BoundedContextCanvas.sln

      - name: Build
        run: dotnet build src/BoundedContextCanvas.sln -c Release --no-restore

      - name: Generate swagger.json
        run: |
          dotnet swagger tofile \
            --output docs/swagger.json \
            src/BoundedContextCanvas.Api/bin/Release/net8.0/BoundedContextCanvas.Api.dll \
            v1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
